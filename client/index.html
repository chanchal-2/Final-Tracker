<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ProjectTracker is a professional SaaS-style academic portal for tracking final year capstone projects, logs, and milestones." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>ProjectTracker - Capstone Project Lifecycle Hub</title>
  <!-- cache-bust: v2 -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Clear any stale real-JWT tokens (keep only mock tokens so app works offline)
      try {
        var t = localStorage.getItem('token');
        if (t && t !== 'mock-token-student' && t !== 'mock-token-guide' && t !== 'mock-token-hod') {
          localStorage.removeItem('token');
        }
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
